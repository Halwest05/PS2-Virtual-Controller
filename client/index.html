<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PS2 Virtual Controller</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css?v=5">
</head>

<body>
    <div id="start-overlay">
        <button id="start-btn">TAP TO ENTER FULLSCREEN</button>
    </div>

    <div id="status-container">
        <span id="player-index">[P?]</span>
        <span id="status">Connecting...</span>
    </div>

    <!-- Edit Mode Controls -->
    <button id="edit-toggle-btn">Edit Layout</button>

    <div id="edit-controls" style="display: none;">
        <label for="size-slider">Scale Selected:</label>
        <input type="range" id="size-slider" min="0.5" max="2.5" step="0.1" value="1">
        <button id="reset-layout-btn">Reset Defaults</button>
    </div>

            <div class="overlay-container">
        <div class="shoulder-group left draggable" id="shoulder-left" data-id="shoulder-left">
            <button class="btn shoulder trigger" data-btn="L2">L2</button>
            <button class="btn shoulder bumper" data-btn="L1">L1</button>
        </div>
        
        <div class="shoulder-group right draggable" id="shoulder-right" data-id="shoulder-right">
            <button class="btn shoulder trigger" data-btn="R2">R2</button>
            <button class="btn shoulder bumper" data-btn="R1">R1</button>
        </div>

        <div class="center-bottom draggable" id="center-bottom" data-id="center-bottom">
            <button class="btn pill" data-btn="SELECT">Select</button>
            <button class="btn pill" id="btn-analog">Analog</button>
            <button class="btn pill" data-btn="START">Start</button>
        </div>

        <div class="thumb-clicks draggable" id="thumb-clicks" data-id="thumb-clicks">
            <button class="btn pill small" data-btn="L3">L3</button>
            <button class="btn pill small" data-btn="R3">R3</button>
        </div>

        <div class="dpad-container draggable" id="dpad-container" data-id="dpad-container">
            <button class="btn dpad up" data-btn="UP"><svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="currentColor"/></svg></button>
            <button class="btn dpad down" data-btn="DOWN"><svg viewBox="0 0 100 100"><polygon points="50,90 10,10 90,10" fill="currentColor"/></svg></button>
            <button class="btn dpad left" data-btn="LEFT"><svg viewBox="0 0 100 100"><polygon points="10,50 90,10 90,90" fill="currentColor"/></svg></button>
            <button class="btn dpad right" data-btn="RIGHT"><svg viewBox="0 0 100 100"><polygon points="90,50 10,90 10,10" fill="currentColor"/></svg></button>
            <div class="dpad-center"></div>
        </div>

        <div class="stick-area left-stick draggable" id="stick-left-base" data-id="stick-left-base">
            <div class="stick-cap" id="stick-left"></div>
        </div>
        
        <div class="stick-area right-stick draggable" id="stick-right-base" data-id="stick-right-base">
            <div class="stick-cap" id="stick-right"></div>
        </div>

        <div class="action-container draggable" id="action-container" data-id="action-container">
            <button class="btn action triangle" data-btn="TRIANGLE">
                <svg viewBox="0 0 100 100"><polygon points="50,20 85,80 15,80" fill="none" stroke="currentColor" stroke-width="10" stroke-linejoin="round"/></svg>
            </button>
            <button class="btn action circle" data-btn="CIRCLE">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="12"/></svg>
            </button>
            <button class="btn action cross" data-btn="CROSS">
                <svg viewBox="0 0 100 100"><line x1="28" y1="28" x2="72" y2="72" stroke="currentColor" stroke-width="14" stroke-linecap="round"/><line x1="72" y1="28" x2="28" y2="72" stroke="currentColor" stroke-width="14" stroke-linecap="round"/></svg>
            </button>
            <button class="btn action square" data-btn="SQUARE">
                <svg viewBox="0 0 100 100"><rect x="22" y="22" width="56" height="56" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
